services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-opentabletop}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-opentabletop}
      POSTGRES_DB: ${POSTGRES_DB:-opentabletop}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-opentabletop}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-opentabletop-dev}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio-data:/data

  api:
    build:
      context: .
      dockerfile: infra/docker/api.Dockerfile
    environment:
      PORT: 4000
      HOST: 0.0.0.0
      OTTE_SQLITE_PATH: /app/storage/opentabletop.sqlite
      OTTE_UPLOAD_DIR: /app/uploads
      OTTE_ASSET_STORAGE: ${OTTE_ASSET_STORAGE:-s3}
      OTTE_S3_ENDPOINT: ${OTTE_S3_ENDPOINT:-http://minio:9000}
      OTTE_S3_BUCKET: ${OTTE_S3_BUCKET:-opentabletop-assets}
      OTTE_S3_REGION: ${OTTE_S3_REGION:-us-east-1}
      OTTE_S3_ACCESS_KEY_ID: ${OTTE_S3_ACCESS_KEY_ID:-opentabletop}
      OTTE_S3_SECRET_ACCESS_KEY: ${OTTE_S3_SECRET_ACCESS_KEY:-opentabletop-dev}
      OTTE_S3_FORCE_PATH_STYLE: ${OTTE_S3_FORCE_PATH_STYLE:-true}
      OTTE_ASSET_QUOTA_BYTES: ${OTTE_ASSET_QUOTA_BYTES:-}
      OTTE_ASSET_RETENTION_DAYS: ${OTTE_ASSET_RETENTION_DAYS:-}
      OTTE_ASSET_CDN_BASE_URL: ${OTTE_ASSET_CDN_BASE_URL:-}
      OTTE_ASSET_URL_SIGNING_SECRET: ${OTTE_ASSET_URL_SIGNING_SECRET:-}
      OTTE_ASSET_URL_TTL_SECONDS: ${OTTE_ASSET_URL_TTL_SECONDS:-300}
      OTTE_ASSET_URL_MAX_TTL_SECONDS: ${OTTE_ASSET_URL_MAX_TTL_SECONDS:-3600}
      OTTE_ASSET_CLEANUP_GRACE_DAYS: ${OTTE_ASSET_CLEANUP_GRACE_DAYS:-7}
      OTTE_AI_PROVIDER: ${OTTE_AI_PROVIDER:-local-echo}
      OTTE_ADMIN_USER_IDS: ${OTTE_ADMIN_USER_IDS:-}
      OTTE_PASSWORD_RESET_URL: ${OTTE_PASSWORD_RESET_URL:-}
      OTTE_PASSWORD_RESET_TTL_MINUTES: ${OTTE_PASSWORD_RESET_TTL_MINUTES:-60}
      OTTE_EMAIL_WEBHOOK_URL: ${OTTE_EMAIL_WEBHOOK_URL:-}
      OTTE_EMAIL_WEBHOOK_TOKEN: ${OTTE_EMAIL_WEBHOOK_TOKEN:-}
      OTTE_EMAIL_WEBHOOK_TIMEOUT_MS: ${OTTE_EMAIL_WEBHOOK_TIMEOUT_MS:-5000}
      OTTE_ALLOW_LEGACY_USER_HEADER: ${OTTE_ALLOW_LEGACY_USER_HEADER:-false}
      OTTE_PLUGIN_TRUST_POLICY: ${OTTE_PLUGIN_TRUST_POLICY:-allow_unsigned}
      OTTE_PLUGIN_TRUST_KEYS: ${OTTE_PLUGIN_TRUST_KEYS:-}
    ports:
      - "${API_PORT:-4000}:4000"
    volumes:
      - api-storage:/app/storage
      - api-uploads:/app/uploads
    depends_on:
      - postgres
      - redis
      - minio

  web:
    build:
      context: .
      dockerfile: infra/docker/web.Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:4000}
    ports:
      - "${WEB_PORT:-5173}:80"
    depends_on:
      - api

volumes:
  postgres-data:
  minio-data:
  api-storage:
  api-uploads:
