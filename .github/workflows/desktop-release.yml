name: desktop-release

on:
  workflow_dispatch:
  push:
    tags:
      - "desktop-v*"

permissions:
  contents: write

jobs:
  windows:
    name: Windows installer
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
        with:
          version: 8.7.0
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @open-tabletop/desktop dist -- --win nsis --publish never
        env:
          CSC_LINK: ${{ secrets.WINDOWS_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.WINDOWS_CSC_KEY_PASSWORD }}
          # Azure Trusted Signing / certificate-profile users can set electron-builder's
          # documented signing env in repository secrets without changing this workflow.
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          AZURE_TRUSTED_SIGNING_ENDPOINT: ${{ secrets.AZURE_TRUSTED_SIGNING_ENDPOINT }}
          AZURE_TRUSTED_SIGNING_ACCOUNT_NAME: ${{ secrets.AZURE_TRUSTED_SIGNING_ACCOUNT_NAME }}
          AZURE_TRUSTED_SIGNING_CERTIFICATE_PROFILE_NAME: ${{ secrets.AZURE_TRUSTED_SIGNING_CERTIFICATE_PROFILE_NAME }}
      - name: Inspect Authenticode signature
        shell: pwsh
        run: |
          $installer = Get-ChildItem apps/desktop/release -Filter *.exe | Select-Object -First 1
          if (-not $installer) { throw "No Windows installer produced." }
          $signature = Get-AuthenticodeSignature $installer.FullName
          Write-Host "Authenticode status: $($signature.Status)"
          if ("${{ vars.REQUIRE_DESKTOP_SIGNING }}" -eq "true" -and $signature.Status -ne "Valid") {
            throw "Installer signature is $($signature.Status)."
          }
      - name: Checksums
        shell: pwsh
        run: |
          Get-ChildItem apps/desktop/release -File | ForEach-Object {
            $hash = Get-FileHash $_.FullName -Algorithm SHA256
            "$($hash.Hash)  $($_.Name)" | Out-File -Append apps/desktop/release/SHA256SUMS.txt -Encoding utf8
          }
      - uses: actions/upload-artifact@v5
        with:
          name: opentabletop-windows
          path: |
            apps/desktop/release/*.exe
            apps/desktop/release/SHA256SUMS.txt

  mac:
    name: macOS DMG
    runs-on: macos-latest
    strategy:
      matrix:
        arch: [x64, arm64]
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
        with:
          version: 8.7.0
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @open-tabletop/desktop dist -- --mac dmg --${{ matrix.arch }} --publish never
        env:
          CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
      - name: Inspect signature and assessment
        run: |
          APP_PATH="$(find apps/desktop/release -name '*.app' -maxdepth 2 | head -n 1)"
          DMG_PATH="$(find apps/desktop/release -name '*.dmg' -maxdepth 1 | head -n 1)"
          test -n "$DMG_PATH"
          if [ -n "$APP_PATH" ]; then
            codesign --verify --deep --strict --verbose=2 "$APP_PATH" || CODESIGN_STATUS=$?
            spctl --assess --type execute --verbose "$APP_PATH" || SPCTL_STATUS=$?
            echo "codesign status: ${CODESIGN_STATUS:-0}"
            echo "spctl status: ${SPCTL_STATUS:-0}"
            if [ "${{ vars.REQUIRE_DESKTOP_SIGNING }}" = "true" ] && { [ "${CODESIGN_STATUS:-0}" != "0" ] || [ "${SPCTL_STATUS:-0}" != "0" ]; }; then
              exit 1
            fi
          else
            echo "No .app bundle left after DMG packaging; skipping signature inspection."
            if [ "${{ vars.REQUIRE_DESKTOP_SIGNING }}" = "true" ]; then
              exit 1
            fi
          fi
      - name: Checksums
        run: |
          cd apps/desktop/release
          checksum_file="SHA256SUMS-${{ matrix.arch }}.txt"
          : > "$checksum_file"
          artifact_found=0
          for artifact in *; do
            if [ -f "$artifact" ] && [ "$artifact" != "$checksum_file" ]; then
              shasum -a 256 "$artifact" >> "$checksum_file"
              artifact_found=1
            fi
          done
          if [ "$artifact_found" -ne 1 ]; then
            echo "No regular macOS release artifacts were produced." >&2
            exit 1
          fi
      - uses: actions/upload-artifact@v5
        with:
          name: opentabletop-macos-${{ matrix.arch }}
          path: |
            apps/desktop/release/*.dmg
            apps/desktop/release/SHA256SUMS-${{ matrix.arch }}.txt

  publish:
    name: Publish release artifacts
    runs-on: ubuntu-latest
    needs: [windows, mac]
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v6
        with:
          path: artifacts
      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
