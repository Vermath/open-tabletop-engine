name: Release Smoke

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read
  issues: read

jobs:
  release-smoke:
    name: pnpm release:smoke:offline
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@b0f76dfb45f55f8421693e4803ac7bb65143bd34 # v6

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Run release smoke
        run: pnpm release:smoke:offline

      - name: Audit open release issues
        if: github.event_name == 'push'
        env:
          GH_TOKEN: ${{ github.token }}
        run: pnpm v1:issues:check

      - name: Upload release gate evidence
        if: always()
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        with:
          name: open-tabletop-release-gate-evidence
          path: artifacts/release-evidence/*.json
          if-no-files-found: error

      - name: Upload API service SBOM
        if: always()
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        with:
          name: open-tabletop-api-sbom
          path: |
            .codex-artifacts/sbom/open-tabletop-api.cdx.json
            .codex-artifacts/sbom/open-tabletop-api-image.cdx.json
          include-hidden-files: true
          if-no-files-found: error
