name: v1 Completion Audit

on:
  workflow_dispatch:
    inputs:
      release_commit:
        description: "Full 40-character release verifier commit SHA"
        required: true
        type: string

permissions:
  contents: read
  issues: read

jobs:
  v1-completion-audit:
    name: pnpm v1:completion:audit
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      GH_TOKEN: ${{ github.token }}
      OTTE_RELEASE_COMMIT: ${{ inputs.release_commit }}

    steps:
      - name: Validate release commit input
        shell: bash
        run: |
          set -euo pipefail
          if [[ ! "${OTTE_RELEASE_COMMIT}" =~ ^[0-9a-fA-F]{40}$ ]]; then
            echo "release_commit must be a full 40-character SHA" >&2
            exit 1
          fi

      - name: Checkout release commit
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: ${{ inputs.release_commit }}
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@b0f76dfb45f55f8421693e4803ac7bb65143bd34 # v6

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run v1 completion audit
        run: pnpm v1:completion:audit
