name: Docs Site

on:
  pull_request:
    paths:
      - "README.md"
      - "CHANGELOG.md"
      - "docs/**"
      - "scripts/build-docs-site.mjs"
      - ".github/workflows/docs-site.yml"
  push:
    branches:
      - main
    paths:
      - "README.md"
      - "CHANGELOG.md"
      - "docs/**"
      - "scripts/build-docs-site.mjs"
      - ".github/workflows/docs-site.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: docs-site-${{ github.event_name == 'pull_request' && github.ref || 'publish' }}
  cancel-in-progress: true

jobs:
  build:
    name: Build public docs site
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@b0f76dfb45f55f8421693e4803ac7bb65143bd34 # v6
        with:
          version: 8.7.0

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build docs site
        run: pnpm docs:site:check

      - name: Upload Pages artifact
        if: ${{ (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch' }}
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5
        with:
          path: dist/docs-site

  deploy:
    name: Deploy public docs site
    if: ${{ (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch' }}
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      contents: read
      pages: write
      id-token: write

    steps:
      - name: Configure Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5
