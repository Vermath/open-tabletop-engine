<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800" role="img" aria-labelledby="title desc">
  <title id="title">Cinder Market battle map</title>
  <desc id="desc">An open cobblestone market square with colorful stalls, a fountain, crates, braziers, and clear paths for an encounter.</desc>
  <defs>
