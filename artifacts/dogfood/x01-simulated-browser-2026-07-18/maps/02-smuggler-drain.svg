<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800" role="img" aria-labelledby="title desc">
  <title id="title">Smuggler Drain battle map</title>
  <desc id="desc">A damp stone drain with two walkways, dark water channels, plank crossings, grates, ladders, and hidden-cargo alcoves.</desc>
  <defs>
