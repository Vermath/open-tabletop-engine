    <pattern id="grid" width="50" height="50" patternUnits="userSpaceOnUse">
      <path d="M50 0H0v50" fill="none" stroke="#d5ece8" stroke-width="2" opacity=".26"/>
    </pattern>
  </defs>
  <rect width="1200" height="800" fill="#172522"/>
  <rect x="55" y="55" width="1090" height="690" rx="35" fill="url(#stone)" stroke="#0e1716" stroke-width="34"/>
