<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800" role="img" aria-labelledby="title desc">
  <title id="title">Ashen Ossuary battle map</title>
  <desc id="desc">A cold underground ossuary with ash-gray flagstones, wall niches, sarcophagi, braziers, pillars, and a cracked central seal.</desc>
  <defs>
    <pattern id="flagstone" width="100" height="100" patternUnits="userSpaceOnUse">
      <rect width="100" height="100" fill="#686767"/>
      <path d="M0 0h100v100H0zM50 0v45M0 45h50M100 45H50M25 45v55M75 45v55" fill="none" stroke="#424141" stroke-width="4" opacity=".7"/>
    </pattern>
    <pattern id="grid" width="50" height="50" patternUnits="userSpaceOnUse">
      <path d="M50 0H0v50" fill="none" stroke="#e6e0dc" stroke-width="2" opacity=".23"/>
    </pattern>
    <radialGradient id="ember">
      <stop offset="0" stop-color="#fff3ad"/>
      <stop offset=".45" stop-color="#e97a2e"/>
      <stop offset="1" stop-color="#4a2422"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="800" fill="#222225"/>
  <rect x="45" y="45" width="1110" height="710" fill="url(#flagstone)" stroke="#151518" stroke-width="34"/>
  <path d="M600 45v710M45 400h1110" stroke="#4b494b" stroke-width="10" opacity=".8"/>

  <g fill="#363638" stroke="#171719" stroke-width="8">
    <path d="M80 80h65v120H80zM170 80h65v120h-65zM260 80h65v120h-65zM875 80h65v120h-65zM965 80h65v120h-65zM1055 80h65v120h-65z"/>
    <path d="M80 600h65v120H80zM170 600h65v120h-65zM260 600h65v120h-65zM875 600h65v120h-65zM965 600h65v120h-65zM1055 600h65v120h-65z"/>
  </g>
  <g fill="#dad0b8" stroke="#6e6659" stroke-width="5" opacity=".85">
    <circle cx="112" cy="120" r="14"/><path d="M98 142l28 35m0-35l-28 35"/>
    <circle cx="202" cy="120" r="14"/><path d="M188 142l28 35m0-35l-28 35"/>
    <circle cx="292" cy="120" r="14"/><path d="M278 142l28 35m0-35l-28 35"/>
    <circle cx="908" cy="120" r="14"/><path d="M894 142l28 35m0-35l-28 35"/>
    <circle cx="998" cy="120" r="14"/><path d="M984 142l28 35m0-35l-28 35"/>
    <circle cx="1088" cy="120" r="14"/><path d="M1074 142l28 35m0-35l-28 35"/>
  </g>

  <g fill="#87827c" stroke="#343235" stroke-width="10">
    <g transform="translate(300 335)"><rect x="-95" y="-55" width="190" height="110" rx="25"/><path d="M-75-20h150M0-38v76" stroke="#aaa49c"/></g>
    <g transform="translate(900 465)"><rect x="-95" y="-55" width="190" height="110" rx="25"/><path d="M-75-20h150M0-38v76" stroke="#aaa49c"/></g>
    <g transform="translate(900 335)"><rect x="-80" y="-45" width="160" height="90" rx="20"/><path d="M-60 0h120" stroke="#aaa49c"/></g>
    <g transform="translate(300 465)"><rect x="-80" y="-45" width="160" height="90" rx="20"/><path d="M-60 0h120" stroke="#aaa49c"/></g>
